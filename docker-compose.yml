services:
  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      WEB_PORT: 5173
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:5173
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: seoyoung-erp-postgres
    profiles:
      - db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: seoyoung
      POSTGRES_PASSWORD: seoyoung_password
      POSTGRES_DB: seoyoung_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seoyoung -d seoyoung_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  web_node_modules:
  postgres_data:
